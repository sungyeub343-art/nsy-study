<!DOCTYPE html>

    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <span class="brand-mark">NSY</span>
          <span>Study</span>
        </a>
        <nav class="nav-links">
          <a href="regions.html">전국과외</a>

          <a href="index.html#contact">무료 상담</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section hero hero--compact">
        <div class="container">
          <div class="regions-hero-center">
            <p class="coverage-badge">International Coverage</p>
            <h1>국제학교 지역 안내</h1>
            <p class="regions-hero-desc">
              학교명 또는 지역을 검색하면 국제학교 상세 페이지로 바로 이동합니다.<br />
              국내외 국제학교의 기본 정보와 입학 준비 상담을 안내합니다.
            </p>

            <div class="regions-tabs" aria-label="서비스 바로가기">
              <a class="regions-tab" href="regions.html">📚 수학·영어과외</a>
              <a class="regions-tab regions-tab--active" href="international.html">🏫 국제학교</a>
              <a class="regions-tab" href="ged.html">📝 검정고시</a>
              <a class="regions-tab" href="essay.html">✍️ 논술</a>
            </div>

            <div class="region-search-wrap" role="search">
              <span class="region-search-icon" aria-hidden="true">🔎</span>
              <input
                id="intlSearchInput"
                type="search"
                placeholder="국제학교/지역 검색 (예: NLCS, 제주, 서울외국인학교)"
                aria-label="국제학교 검색"
                autocomplete="off"
              />
            </div>

            <div class="region-search-results" id="intlSearchResults" aria-live="polite"></div>

            <div class="province-chip-grid" id="intlProvinceChipGrid" aria-label="국제학교 지역 빠른 선택"></div>

            <p class="region-help-text" id="intlHelpText">지역 버튼 또는 검색어로 국제학교 상세 페이지로 바로 이동할 수 있습니다.</p>

            <div class="city-chip-grid" id="intlSchoolChipGrid" aria-label="국제학교 목록"></div>
          </div>
        </div>
      </section>
