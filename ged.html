            <h1>검정고시 지역 안내</h1>
            <p class="regions-hero-desc">
              원하는 지역을 검색하거나 시·도를 선택하면 검정고시 대비 상담 페이지로 바로 이동합니다.<br />

            <div class="regions-tabs" aria-label="서비스 바로가기">

            <div class="region-search-wrap" role="search">
              <span class="region-search-icon" aria-hidden="true">🔎</span>

                type="search"
                placeholder="검정고시 지역 검색 (예: 강남구, 수원시, 제주시)"

                autocomplete="off"

            <p class="region-help-text" id="gedHelpText">시·도 버튼 또는 검색으로 지역을 선택하면 상세 상담 페이지로 이동합니다.</p>

            <div class="city-chip-grid" id="gedCityChipGrid" aria-label="검정고시 시군구 선택"></div>
